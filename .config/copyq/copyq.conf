[Options]
always_on_top=true
frameless_window=@ByteArray(true)
hide_main_window_in_task_bar=@ByteArray(true)
hide_tabs=true
hide_toolbar=true
restore_geometry=@ByteArray(false)
show_advanced_command_settings=false
show_simple_items=false
tabs=&clipboard

[Theme]
alt_bg=#00001a
alt_item_css=
bg=#000021
css="QListView { background-color: #000021; color: #dbdfbc; border: none; }\nQListView::item { border-bottom: 1px solid #000033; padding: 8px; }\nQListView::item:selected { background-color: #dbdfbc; color: #02143f; }\n#item,#item_child { max-height: 90px; }\nQLabel { qproperty-alignment: AlignCenter; max-height: 90px; }\nQScrollBar { width: 0px; height: 0px; }"
css_template_items=items
css_template_main_window=main_window
css_template_menu=menu
css_template_notification=notification
cur_item_css="\n    ;border: 0.1em solid ${sel_bg}"
edit_bg=#000021
edit_fg=#dbdfbc
edit_font="mono,10,-1,5,50,0,0,0,0,0"
fg=#dbdfbc
find_bg=#02143f
find_fg=#dbdfbc
find_font="mono,10,-1,5,50,0,0,0,0,0"
font="mono,10,-1,5,50,0,0,0,0,0"
font_antialiasing=true
hover_item_css=
icon_size=20
item_css=
item_spacing=
menu_bar_css="\n    ;background: ${bg}\n    ;color: ${fg}\n    ;height: 0px\n    ;font-size: 0px"
menu_bar_disabled_css="\n    ;color: ${bg - #666}"
menu_bar_selected_css="\n    ;background: ${sel_bg}\n    ;color: ${sel_fg}"
menu_css="\n    ;border: 1px solid ${sel_bg}\n    ;background: ${bg}\n    ;color: ${fg}"
notes_bg=#000021
notes_css=
notes_fg=#dbdfbc
notes_font="mono,10,-1,5,50,0,0,0,0,0"
notification_bg=#02143f
notification_fg=#dbdfbc
notification_font=
num_fg=#6e7161
num_font="mono,9,-1,5,25,0,0,0,0,0"
num_margin=2
num_sel_fg=
search_bar="\n    ;background: ${edit_bg}\n    ;color: ${edit_fg}\n    ;border: 1px solid ${alt_bg}\n    ;margin: 2px"
search_bar_focused="\n    ;border: 1px solid ${sel_bg}"
sel_bg=#dbdfbc
sel_fg=#02143f
sel_item_css=
show_number=true
show_scrollbars=false
style_main_window=true
tab_bar_css="\n    ;background: #00001a\n    ;border: 0"
tab_bar_item_counter="\n    ;color: ${fg}\n    ;font-size: 6pt"
tab_bar_scroll_buttons_css="\n    ;background: #00001a\n    ;color: ${fg}\n    ;border: 0"
tab_bar_sel_item_counter="\n    ;color: ${sel_bg}"
tab_bar_tab_selected_css="\n    ;padding: 0.5em\n    ;background: #000021\n    ;color: #dbdfbc\n    ;border: 0"
tab_bar_tab_unselected_css="\n    ;padding: 0.5em\n    ;background: #00001a\n    ;color: #7a7e6c\n    ;border: 0"
tab_tree_css="\n    ;color: ${fg}\n    ;background-color: ${bg}"
tab_tree_item_counter="\n    ;color: ${fg}\n    ;font-size: 6pt"
tab_tree_sel_item_counter="\n    ;color: ${sel_fg}"
tab_tree_sel_item_css="\n    ;color: ${sel_fg}\n    ;background-color: ${sel_bg}\n    ;border-radius: 2px"
tool_bar_css="\n    ;color: ${fg}\n    ;background-color: ${bg}\n    ;border: 0"
tool_button_css="\n    ;color: ${fg}\n    ;background: ${bg}\n    ;border: 0\n    ;border-radius: 2px"
tool_button_pressed_css="\n    ;background: ${sel_bg}"
tool_button_selected_css="\n    ;background: ${sel_bg}\n    ;color: ${sel_fg}\n    ;border: 1px solid ${sel_bg}"
use_system_icons=true
